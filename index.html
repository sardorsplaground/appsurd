<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Appsurd â Build the Absurd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&display=swap">
<style>
/* ---------- theme ---------- */
:root {
  --bg: #0a0a0a;
  --bg-elev: #111111;
  --bg-elev-2: #171717;
  --line: #262626;
  --line-strong: #3d3d3d;
  --fg: #f4f4f4;
  --fg-dim: #a0a0a0;
  --fg-mute: #6a6a6a;
  --accent: #ffffff;
  --accent-ink: #0a0a0a;
  --grid: rgba(255,255,255,0.035);
  --card: #131313;
  --shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 30px 60px -30px rgba(0,0,0,0.6);
}
html[data-theme="light"] {
  --bg: #f6f6f4;
  --bg-elev: #efefec;
  --bg-elev-2: #e8e8e4;
  --line: #dedcd6;
  --line-strong: #bcbab3;
  --fg: #0a0a0a;
  --fg-dim: #5a5a5a;
  --fg-mute: #8a8a8a;
  --accent: #0a0a0a;
  --accent-ink: #f6f6f4;
  --grid: rgba(0,0,0,0.04);
  --card: #efefec;
  --shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 30px 60px -30px rgba(0,0,0,0.18);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  font-size: 17px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  transition: background 400ms ease, color 400ms ease;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
.serif { font-family: 'Fraunces', ui-serif, Georgia, serif; font-style: italic; }

/* ---------- layout helpers ---------- */
.wrap {
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 40px;
}
@media (max-width: 720px) { .wrap { padding: 0 22px; } }

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-dim);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}

.section {
  padding: 140px 0;
  border-top: 1px solid var(--line);
  position: relative;
}
@media (max-width: 720px) { .section { padding: 80px 0; } }

.section-head {
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  gap: 60px;
  margin-bottom: 80px;
  align-items: end;
}
@media (max-width: 900px) {
  .section-head { grid-template-columns: 1fr; gap: 24px; margin-bottom: 48px; }
}
.section-head h2 {
  font-size: clamp(44px, 7vw, 96px);
  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 0.95;
  margin: 16px 0 0 0;
}
.section-head p {
  font-size: clamp(17px, 1.4vw, 21px);
  color: var(--fg-dim);
  max-width: 520px;
  margin: 0;
  line-height: 1.5;
}

/* ---------- background grid ---------- */
.grid-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(to right, var(--grid) 1px, transparent 1px),
    linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
  background-size: 80px 80px;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 85%);
}

/* ---------- nav ---------- */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  background: color-mix(in oklab, var(--bg) 75%, transparent);
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-size: 20px;
}
.logo-mark {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--accent);
  color: var(--accent-ink);
  display: grid;
  place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 14px;
  transform: rotate(-8deg);
  transition: transform 300ms ease;
}
.logo:hover .logo-mark { transform: rotate(8deg) scale(1.08); }
.nav-links {
  display: flex;
  gap: 36px;
  font-size: 14px;
  color: var(--fg-dim);
}
.nav-links a { transition: color 200ms; }
.nav-links a:hover { color: var(--fg); }
.nav-cta {
  display: flex;
  align-items: center;
  gap: 14px;
}
@media (max-width: 780px) { .nav-links { display: none; } }

/* ---------- buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.01em;
  transition: transform 200ms ease, background 200ms ease, color 200ms ease, border-color 200ms;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-ghost {
  border: 1px solid var(--line-strong);
  color: var(--fg);
}
.btn-ghost:hover { border-color: var(--fg); }
.btn-sm { padding: 10px 16px; font-size: 13px; }
.btn .arrow {
  display: inline-block;
  transition: transform 200ms ease;
}
.btn:hover .arrow { transform: translateX(3px); }

/* ---------- hero ---------- */
.hero {
  position: relative;
  padding: 80px 0 60px;
  overflow: hidden;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px 6px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12px;
  color: var(--fg-dim);
  background: var(--bg-elev);
}
.hero-badge .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--fg);
  position: relative;
}
.hero-badge .dot::after {
  content: "";
  position: absolute; inset: -4px;
  border-radius: 50%;
  background: var(--fg);
  opacity: 0.3;
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0% { transform: scale(0.8); opacity: 0.45; }
  70% { transform: scale(2.2); opacity: 0; }
  100% { transform: scale(2.2); opacity: 0; }
}

.hero-h1 {
  margin: 28px 0 0;
  font-weight: 500;
  font-size: clamp(72px, 13vw, 220px);
  line-height: 0.88;
  letter-spacing: -0.05em;
}
.hero-h1 .absurd-wrap {
  display: inline-block;
  position: relative;
}
.hero-h1 .absurd {
  display: inline-block;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-variation-settings: "SOFT" 100, "opsz" 144;
  color: var(--fg);
  letter-spacing: -0.04em;
  animation: absurdStretch 6s ease-in-out infinite;
  transform-origin: left center;
}
@keyframes absurdStretch {
  0%, 100% { font-variation-settings: "opsz" 144, "SOFT" 100, "wght" 400; letter-spacing: -0.04em; }
  50%     { font-variation-settings: "opsz" 144, "SOFT" 100, "wght" 700; letter-spacing: -0.08em; }
}
.hero-h1 .period {
  color: var(--fg);
  display: inline-block;
}

.hero-sub {
  margin-top: 40px;
  font-size: clamp(18px, 1.5vw, 22px);
  color: var(--fg-dim);
  max-width: 580px;
  line-height: 1.5;
}
.hero-ctas {
  margin-top: 40px;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.hero-proof {
  margin-top: 72px;
  display: flex;
  align-items: center;
  gap: 28px;
  flex-wrap: wrap;
  padding-top: 28px;
  border-top: 1px solid var(--line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--fg-dim);
  text-transform: uppercase;
  letter-spacing: 0.14em;
}
.hero-proof .stars {
  color: var(--accent);
  letter-spacing: 0;
  text-transform: none;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
}
.hero-proof .sep {
  opacity: 0.4;
}

/* floating absurd element */
.hero-float {
  position: absolute;
  right: -5%;
  top: 18%;
  width: 280px;
  height: 280px;
  pointer-events: none;
  opacity: 0.9;
}
.hero-float .ring {
  position: absolute;
  inset: 0;
  border: 1px dashed var(--line-strong);
  border-radius: 50%;
  animation: spin 40s linear infinite;
}
.hero-float .ring span {
  position: absolute;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--fg-dim);
  letter-spacing: 0.2em;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg);
  padding: 0 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 900px) {
  .hero-float { display: none; }
}

/* ---------- marquee ---------- */
.marquee {
  overflow: hidden;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 22px 0;
  background: var(--bg-elev);
}
.marquee-track {
  display: flex;
  gap: 56px;
  animation: marquee 38s linear infinite;
  white-space: nowrap;
  width: max-content;
}
.marquee-track span {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 42px;
  letter-spacing: -0.02em;
  color: var(--fg);
  display: inline-flex;
  align-items: center;
  gap: 56px;
}
.marquee-track span::after {
  content: "â±";
  color: var(--fg-dim);
  font-size: 22px;
  font-style: normal;
}
@keyframes marquee {
  to { transform: translateX(-50%); }
}

/* ---------- problem grid ---------- */
.problems {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: 20px;
  overflow: hidden;
}
@media (max-width: 1000px) { .problems { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .problems { grid-template-columns: 1fr; } }

.prob {
  background: var(--bg);
  padding: 36px 32px 40px;
  position: relative;
  transition: background 300ms;
  min-height: 360px;
  display: flex;
  flex-direction: column;
}
.prob:hover { background: var(--bg-elev); }
.prob-num {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 140px;
  line-height: 0.8;
  color: var(--fg);
  letter-spacing: -0.06em;
  margin: 0 0 auto 0;
  transition: color 300ms;
}
.prob:hover .prob-num { color: var(--fg-dim); }
.prob-title {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin: 32px 0 10px;
}
.prob-desc {
  font-size: 14px;
  color: var(--fg-dim);
  line-height: 1.55;
  margin: 0;
}
.prob-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--fg-mute);
  text-transform: uppercase;
  position: absolute;
  top: 20px; right: 24px;
}

/* ---------- solution ---------- */
.solution-bg {
  background: var(--bg-elev);
}
.features {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 24px;
}
.feat {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 36px;
  position: relative;
  overflow: hidden;
  transition: border-color 300ms, transform 400ms cubic-bezier(.2,.8,.2,1);
}
.feat:hover { border-color: var(--line-strong); transform: translateY(-3px); }
.feat-1 { grid-column: span 7; min-height: 380px; }
.feat-2 { grid-column: span 5; min-height: 380px; }
.feat-3 { grid-column: span 5; min-height: 320px; }
.feat-4 { grid-column: span 7; min-height: 320px; }
@media (max-width: 900px) {
  .feat-1, .feat-2, .feat-3, .feat-4 { grid-column: span 12; min-height: 280px; }
}

.feat-title {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.025em;
  margin: 0 0 10px;
}
.feat-desc {
  color: var(--fg-dim);
  max-width: 380px;
  font-size: 15px;
  line-height: 1.55;
  margin: 0;
}
.feat-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--fg-mute);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 60px;
  display: flex;
  justify-content: space-between;
}

/* typographic illustration bits */
.feat-viz {
  position: absolute;
  pointer-events: none;
}
.viz-infinity {
  bottom: -20px; right: 24px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 220px;
  line-height: 1;
  color: var(--fg);
  opacity: 0.85;
}
.viz-top1 {
  bottom: -40px; right: 20px;
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 260px;
  line-height: 1;
  color: var(--fg);
  letter-spacing: -0.08em;
}
.viz-top1 em {
  font-style: italic;
  color: var(--fg-dim);
}
.viz-48 {
  bottom: -20px; right: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 140px;
  line-height: 1;
  color: var(--fg);
  letter-spacing: -0.04em;
}
.viz-48 sup {
  font-size: 32px;
  vertical-align: super;
  color: var(--fg-dim);
  font-family: 'Space Grotesk', sans-serif;
}
.viz-dollar {
  bottom: -50px; right: 10px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 280px;
  line-height: 1;
  color: var(--fg);
}
.viz-dollar s {
  text-decoration: line-through;
  text-decoration-color: var(--fg);
  text-decoration-thickness: 8px;
}

/* ---------- steps ---------- */
.steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
  counter-reset: step;
}
@media (max-width: 900px) { .steps { grid-template-columns: 1fr; } }
.step {
  padding: 40px 0 0;
  border-top: 1px solid var(--line-strong);
  position: relative;
}
.step::before {
  content: "";
  position: absolute;
  top: -1px; left: 0;
  height: 1px; width: 0;
  background: var(--accent);
  transition: width 600ms cubic-bezier(.2,.8,.2,1);
}
.step.in::before { width: 60%; background: var(--fg); }
.step-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--fg-mute);
  letter-spacing: 0.18em;
}
.step-big {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(90px, 12vw, 180px);
  line-height: 0.9;
  margin: 12px 0 24px;
  letter-spacing: -0.04em;
}
.step:nth-child(2) .step-big { color: var(--fg-dim); }
.step-title {
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin: 0 0 12px;
}
.step-desc {
  color: var(--fg-dim);
  font-size: 15px;
  line-height: 1.55;
  max-width: 360px;
}

/* ---------- pricing ---------- */
.toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--bg-elev);
  margin-bottom: 48px;
}
.toggle button {
  padding: 10px 20px;
  font-size: 13px;
  color: var(--fg-dim);
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 200ms;
}
.toggle button.on {
  background: var(--fg);
  color: var(--bg);
}
.toggle .save {
  display: inline-block;
  margin-left: 6px;
  color: var(--fg);
  font-size: 10px;
  background: color-mix(in oklab, var(--fg) 12%, transparent);
  padding: 2px 6px;
  border-radius: 6px;
}
.toggle button.on .save {
  color: var(--bg);
  background: color-mix(in oklab, var(--bg) 18%, transparent);
}

.plans {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 1000px) { .plans { grid-template-columns: 1fr; } }

.plan {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 36px 32px 32px;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: border-color 300ms;
}
.plan:hover { border-color: var(--line-strong); }
.plan.featured {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}
.plan.featured .plan-label,
.plan.featured .plan-sub,
.plan.featured .plan-feat {
  color: color-mix(in oklab, var(--bg) 65%, var(--fg));
}
.plan.featured .plan-feat svg { color: var(--bg); }

.plan-badge {
  position: absolute;
  top: -12px; left: 32px;
  background: var(--fg);
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--fg);
}
.plan-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-dim);
}
.plan-name {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 56px;
  line-height: 1;
  margin: 14px 0 10px;
  letter-spacing: -0.03em;
}
.plan-sub {
  color: var(--fg-dim);
  font-size: 14px;
  margin: 0 0 32px;
  min-height: 40px;
}
.plan-price {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 4px;
}
.plan-price .amt {
  font-size: 48px;
  font-weight: 500;
  letter-spacing: -0.035em;
  font-variant-numeric: tabular-nums;
}
.plan-price .per {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--fg-dim);
}
.plan-billing {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--fg-mute);
  letter-spacing: 0.08em;
  margin-bottom: 28px;
}
.plan-feat {
  list-style: none;
  padding: 0;
  margin: 0 0 28px;
  color: var(--fg-dim);
  font-size: 14px;
  flex: 1;
}
.plan-feat li {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-top: 1px solid color-mix(in oklab, var(--line) 80%, transparent);
}
.plan-feat li:first-child { border-top: 0; }
.plan-feat svg {
  flex: none;
  width: 14px; height: 14px;
  margin-top: 4px;
  color: var(--fg);
}
.plan .btn-plan {
  padding: 14px 20px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  width: 100%;
  justify-content: center;
  text-align: center;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--line-strong);
  transition: all 200ms;
}
.plan .btn-plan:hover { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.plan.featured .btn-plan {
  background: var(--bg);
  color: var(--fg);
  border-color: var(--bg);
}
.plan.featured .btn-plan:hover { background: transparent; color: var(--bg); border-color: var(--bg); }

/* ---------- testimonials ---------- */
.testis {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 1000px) { .testis { grid-template-columns: 1fr; } }
.testi {
  padding: 36px 32px;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: var(--card);
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: relative;
  transition: border-color 300ms, transform 400ms;
}
.testi:hover { border-color: var(--line-strong); transform: translateY(-2px); }
.testi-quote-mark {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 80px;
  line-height: 0.5;
  color: var(--fg);
  height: 32px;
}
.testi q {
  quotes: none;
  font-size: 19px;
  line-height: 1.45;
  letter-spacing: -0.015em;
  color: var(--fg);
}
.testi q::before, .testi q::after { content: ""; }
.testi-foot {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 14px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
}
.testi-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  display: grid;
  place-items: center;
  color: var(--bg);
  font-size: 14px;
}
.testi-name { font-weight: 500; font-size: 15px; }
.testi-role { font-size: 13px; color: var(--fg-dim); }
.testi-stars { margin-left: auto; color: var(--fg); letter-spacing: -0.05em; font-size: 14px; }

/* ---------- faq ---------- */
.faqs {
  border-top: 1px solid var(--line-strong);
}
.faq {
  border-bottom: 1px solid var(--line);
}
.faq button {
  width: 100%;
  text-align: left;
  padding: 28px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  font-size: clamp(20px, 2vw, 26px);
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--fg);
  transition: color 200ms;
}
.faq button:hover { color: var(--fg-dim); }
.faq-idx {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--fg-mute);
  letter-spacing: 0.15em;
  margin-right: 16px;
}
.faq-toggle {
  flex: none;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  display: grid;
  place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  color: var(--fg-dim);
  transition: all 300ms;
}
.faq.open .faq-toggle { background: var(--fg); color: var(--bg); border-color: var(--fg); transform: rotate(45deg); }
.faq-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 400ms cubic-bezier(.2,.8,.2,1);
}
.faq.open .faq-body { grid-template-rows: 1fr; }
.faq-body >div {
  overflow: hidden;
}
.faq-body p {
  max-width: 720px;
  padding: 0 0 28px 48px;
  color: var(--fg-dim);
  font-size: 16px;
  line-height: 1.6;
  margin: 0;
}

/* ---------- footer cta ---------- */
.foot-cta {
  text-align: center;
  padding: 160px 0;
  position: relative;
  overflow: hidden;
}
.foot-cta h2 {
  font-size: clamp(56px, 9vw, 140px);
  line-height: 0.9;
  letter-spacing: -0.04em;
  font-weight: 500;
  margin: 0 auto;
  max-width: 14ch;
}
.foot-cta h2 em {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  color: var(--fg-dim);
}
.foot-cta p {
  margin-top: 28px;
  color: var(--fg-dim);
  font-size: 18px;
}
.foot-cta .ctas {
  margin-top: 40px;
  display: inline-flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.foot-cta .trust {
  margin-top: 32px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--fg-mute);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

/* ---------- footer ---------- */
.footer {
  border-top: 1px solid var(--line);
  padding: 72px 0 40px;
  background: var(--bg-elev);
}
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 48px;
}
@media (max-width: 900px) { .footer-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 560px) { .footer-grid { grid-template-columns: 1fr; } }

.footer h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin: 0 0 18px;
  font-weight: 500;
}
.footer ul { list-style: none; padding: 0; margin: 0; }
.footer ul li { padding: 6px 0; font-size: 14px; color: var(--fg-dim); }
.footer ul li a:hover { color: var(--fg); }
.footer-brand p { font-size: 14px; color: var(--fg-dim); margin: 16px 0 0; max-width: 320px; line-height: 1.55; }
.footer-bottom {
  margin-top: 56px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--fg-mute);
  letter-spacing: 0.12em;
}
.footer-bottom .built {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.footer-bottom .built .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--fg); box-shadow: 0 0 8px color-mix(in oklab, var(--fg) 60%, transparent);
}

/* ---------- scroll reveal ---------- */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1);
}
.reveal.in {
  opacity: 1;
  transform: none;
}

/* ---------- tweaks panel ---------- */
.tweaks {
  position: fixed;
  right: 20px; bottom: 20px;
  z-index: 100;
  background: var(--bg-elev-2);
  border: 1px solid var(--line-strong);
  border-radius: 16px;
  padding: 16px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: none;
  flex-direction: column;
  gap: 10px;
  min-width: 220px;
  box-shadow: 0 20px 60px -20px rgba(0,0,0,0.5);
}
.tweaks.on { display: flex; }
.tweaks h5 {
  margin: 0 0 4px;
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0.2em;
  font-weight: 500;
}
.tweaks .row { display: flex; gap: 6px; }
.tweaks .swatch {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--fg-dim);
  cursor: pointer;
  text-align: center;
